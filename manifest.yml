modules:
  macro:
    - key: mermaid-diagram
      resource: mermaid-main
      icon: resource:mermaid-main;icon.svg
      title: Mermaid Diagram
      description: Render Mermaid diagrams on Confluence pages
      categories:
        - visuals
      config:
        resource: mermaid-config
        viewportSize: fullscreen
        title: Edit Mermaid Diagram
        openOnInsert: true
      resolver:
        function: resolver

    - key: markdown-renderer
      resource: markdown-main
      icon: resource:markdown-main;icon.svg
      title: Markdown
      description: Write and render Markdown content
      categories:
        - formatting
      config:
        resource: markdown-config
        viewportSize: fullscreen
        title: Edit Markdown
        openOnInsert: true
      resolver:
        function: resolver

    - key: swagger-api-docs
      resource: swagger-main
      icon: resource:swagger-main;icon.svg
      title: Swagger / OpenAPI
      description: Render interactive API documentation from OpenAPI specs
      categories:
        - development
      config:
        resource: swagger-config
        viewportSize: fullscreen
        title: Edit OpenAPI Spec
        openOnInsert: true
      resolver:
        function: resolver

    - key: drawio-diagram
      resource: drawio-main
      icon: resource:drawio-main;icon.svg
      title: Draw.io Diagram
      description: Create and edit diagrams with Draw.io
      categories:
        - visuals
      config:
        resource: drawio-config
        viewportSize: fullscreen
        title: Edit Diagram
        openOnInsert: true
      resolver:
        function: resolver

    - key: poll-vote
      resource: poll-main
      icon: resource:poll-main;icon.svg
      title: Poll / Vote
      description: Create polls and collect votes from users
      categories:
        - communication
      config:
        resource: poll-config
        viewportSize: large
        title: Create Poll
        openOnInsert: true
      resolver:
        function: resolver

    - key: mood-macro
      resource: mood-main
      icon: resource:mood-main;icon.svg
      title: Mood
      description: Visualize team mood with floating bubbles
      categories:
        - communication
      config:
        resource: mood-config
        viewportSize: large
        title: Create Mood Board
        openOnInsert: true
      resolver:
        function: resolver

    - key: graph-chart
      resource: graph-main
      icon: resource:graph-main;icon.svg
      title: Graph / Chart
      description: Render interactive charts and graphs
      categories:
        - visuals
      config:
        resource: graph-config
        viewportSize: fullscreen
        title: Configure Chart
        openOnInsert: true
      resolver:
        function: resolver

    - key: typewriter-macro
      resource: typewriter-main
      icon: resource:typewriter-main;icon.svg
      title: Typewriter
      description: Animate text with typewriter/chat-style effects
      categories:
        - formatting
      config:
        resource: typewriter-config
        viewportSize: large
        title: Typewriter Effect
        openOnInsert: true
      resolver:
        function: resolver

    - key: carousel-macro
      resource: carousel-main
      icon: resource:carousel-main;icon.svg
      title: Carousel / Slideshow
      description: Display images in an animated carousel
      categories:
        - media
      config:
        resource: carousel-config
        viewportSize: large
        title: Carousel Settings
        openOnInsert: true
      resolver:
        function: resolver

  confluence:globalSettings:
    - key: macro-settings
      resource: admin-page
      icon: resource:admin-page;app-icon.svg
      title: Macro Toolkit Settings
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: mermaid-main
    path: static/mermaid-macro/build
  - key: mermaid-config
    path: static/mermaid-config/build
  - key: markdown-main
    path: static/markdown-macro/build
  - key: markdown-config
    path: static/markdown-config/build
  - key: swagger-main
    path: static/swagger-macro/build
  - key: swagger-config
    path: static/swagger-config/build
  - key: drawio-main
    path: static/drawio-macro/build
  - key: drawio-config
    path: static/drawio-config/build
  - key: admin-page
    path: static/admin-page/build
  - key: poll-main
    path: static/poll-macro/build
  - key: poll-config
    path: static/poll-config/build
  - key: mood-main
    path: static/mood-macro/build
  - key: mood-config
    path: static/mood-config/build
  - key: graph-main
    path: static/graph-macro/build
  - key: graph-config
    path: static/graph-config/build
  - key: typewriter-main
    path: static/typewriter-macro/build
  - key: typewriter-config
    path: static/typewriter-config/build
  - key: carousel-main
    path: static/carousel-macro/build
  - key: carousel-config
    path: static/carousel-config/build

app:
  id: ari:cloud:ecosystem::app/7e3d309e-e608-473a-acb3-103e5570a165
  runtime:
    name: nodejs22.x
permissions:
  content:
    styles:
      - unsafe-inline
  scopes:
    - read:confluence-content.summary
    - read:confluence-content.all
    - read:confluence-user
    - write:confluence-content
    - write:confluence-file
    - storage:app
  external:
    fetch:
      backend:
        - address: https://embed.diagrams.net
    frames:
      - address: https://embed.diagrams.net
    images:
      - address: '*.atlassian.net'
