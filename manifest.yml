modules:
  macro:
    - key: mermaid-diagram
      resource: mermaid-main
      icon: resource:mermaid-main;icon.svg
      title: Mermaid Diagram
      description: Render Mermaid diagrams on Confluence pages
      categories:
        - visuals
      config:
        resource: mermaid-config
        viewportSize: fullscreen
        title: Edit Mermaid Diagram
        openOnInsert: true
      resolver:
        function: resolver

    - key: markdown-renderer
      resource: markdown-main
      icon: resource:markdown-main;icon.svg
      title: Markdown
      description: Write and render Markdown content
      categories:
        - formatting
      config:
        resource: markdown-config
        viewportSize: fullscreen
        title: Edit Markdown
        openOnInsert: true
      resolver:
        function: resolver

    - key: swagger-api-docs
      resource: swagger-main
      icon: resource:swagger-main;icon.svg
      title: Swagger / OpenAPI
      description: Render interactive API documentation from OpenAPI specs
      categories:
        - development
      config:
        resource: swagger-config
        viewportSize: fullscreen
        title: Edit OpenAPI Spec
        openOnInsert: true
      resolver:
        function: resolver

    - key: drawio-diagram
      resource: drawio-main
      icon: resource:drawio-main;icon.svg
      title: Draw.io Diagram
      description: Create and edit diagrams with Draw.io
      categories:
        - visuals
      config:
        resource: drawio-config
        viewportSize: fullscreen
        title: Edit Diagram
        openOnInsert: true
      resolver:
        function: resolver

    - key: poll-vote
      resource: poll-main
      icon: resource:poll-main;icon.svg
      title: Poll / Vote
      description: Create polls and collect votes from users
      categories:
        - communication
      config:
        resource: poll-config
        viewportSize: large
        title: Create Poll
        openOnInsert: true
      resolver:
        function: resolver

    - key: mood-macro
      resource: mood-main
      icon: resource:mood-main;icon.svg
      title: Mood
      description: Visualize team mood with floating bubbles
      categories:
        - communication
      config:
        resource: mood-config
        viewportSize: large
        title: Create Mood Board
        openOnInsert: true
      resolver:
        function: resolver

    - key: graph-chart
      resource: graph-main
      icon: resource:graph-main;icon.svg
      title: Graph / Chart
      description: Render interactive charts and graphs
      categories:
        - visuals
      config:
        resource: graph-config
        viewportSize: fullscreen
        title: Configure Chart
        openOnInsert: true
      resolver:
        function: resolver

    - key: typewriter-macro
      resource: typewriter-main
      icon: resource:typewriter-main;icon.svg
      title: Typewriter
      description: Animate text with typewriter/chat-style effects
      categories:
        - formatting
      config:
        resource: typewriter-config
        viewportSize: large
        title: Typewriter Effect
        openOnInsert: true
      resolver:
        function: resolver

    - key: plantuml-macro
      resource: plantuml-main
      icon: resource:plantuml-main;icon.svg
      title: PlantUML
      description: Render UML diagrams from PlantUML syntax
      categories:
        - visuals
      config:
        resource: plantuml-config
        viewportSize: fullscreen
        title: PlantUML Editor
        openOnInsert: true
      resolver:
        function: resolver

    - key: excalidraw-wireframe
      resource: excalidraw-main
      icon: resource:excalidraw-main;icon.svg
      title: Wireframe / Whiteboard
      description: Create wireframes and sketches with Excalidraw
      categories:
        - visuals
      config:
        resource: excalidraw-config
        viewportSize: fullscreen
        title: Wireframe Editor
        openOnInsert: true
      resolver:
        function: resolver

    - key: clock-gadget
      resource: clock-main
      icon: resource:clock-main;icon.svg
      title: Clock
      description: Display configurable clock gadgets (analog/digital)
      categories:
        - visuals
      config:
        resource: clock-config
        viewportSize: large
        title: Configure Clocks
        openOnInsert: true
      resolver:
        function: resolver

    - key: carousel-slideshow
      resource: carousel-main
      icon: resource:carousel-main;icon.svg
      title: Carousel / Slideshow
      description: Display images in an interactive slideshow
      categories:
        - visuals
      config:
        resource: carousel-config
        viewportSize: fullscreen
        title: Configure Carousel
        openOnInsert: true
      resolver:
        function: resolver

    - key: sticky-note
      resource: sticky-main
      title: Sticky Note
      description: Add colorful sticky notes with handwritten style
      categories:
        - formatting
      config:
        resource: sticky-config
        viewportSize: large
        title: Sticky Note
        openOnInsert: true
      resolver:
        function: resolver

    - key: spoiler-reveal
      resource: spoiler-main
      title: Spoiler / Reveal
      description: Hide content behind a pattern with animated reveal on click
      categories:
        - formatting
      config:
        resource: spoiler-config
        viewportSize: large
        title: Spoiler Settings
        openOnInsert: true
      resolver:
        function: resolver

  confluence:globalSettings:
    - key: macro-settings
      resource: admin-page
      icon: resource:admin-page;app-icon.svg
      title: Macro Toolkit Settings
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: mermaid-main
    path: static/mermaid-macro/build
  - key: mermaid-config
    path: static/mermaid-config/build
  - key: markdown-main
    path: static/markdown-macro/build
  - key: markdown-config
    path: static/markdown-config/build
  - key: swagger-main
    path: static/swagger-macro/build
  - key: swagger-config
    path: static/swagger-config/build
  - key: drawio-main
    path: static/drawio-macro/build
  - key: drawio-config
    path: static/drawio-config/build
  - key: admin-page
    path: static/admin-page/build
  - key: poll-main
    path: static/poll-macro/build
  - key: poll-config
    path: static/poll-config/build
  - key: mood-main
    path: static/mood-macro/build
  - key: mood-config
    path: static/mood-config/build
  - key: graph-main
    path: static/graph-macro/build
  - key: graph-config
    path: static/graph-config/build
  - key: typewriter-main
    path: static/typewriter-macro/build
  - key: typewriter-config
    path: static/typewriter-config/build
  - key: plantuml-main
    path: static/plantuml-macro/build
  - key: plantuml-config
    path: static/plantuml-config/build
  - key: excalidraw-main
    path: static/excalidraw-macro/build
  - key: excalidraw-config
    path: static/excalidraw-config/build
  - key: clock-main
    path: static/clock-macro/build
  - key: clock-config
    path: static/clock-config/build
  - key: carousel-main
    path: static/carousel-macro/build
  - key: carousel-config
    path: static/carousel-config/build
  - key: sticky-main
    path: static/sticky-macro/build
  - key: sticky-config
    path: static/sticky-config/build
  - key: spoiler-main
    path: static/spoiler-macro/build
  - key: spoiler-config
    path: static/spoiler-config/build

app:
  id: ari:cloud:ecosystem::app/7e3d309e-e608-473a-acb3-103e5570a165
  runtime:
    name: nodejs22.x
permissions:
  content:
    styles:
      - unsafe-inline
  scopes:
    - read:confluence-content.summary
    - read:confluence-content.all
    - read:confluence-user
    - write:confluence-file
    - storage:app
    - search:confluence
  external:
    fetch:
      backend:
        - address: https://embed.diagrams.net
        - address: https://www.plantuml.com
      client:
        - address: https://libraries.excalidraw.com
    frames:
      - address: https://embed.diagrams.net
    images:
      - address: '*.atlassian.net'
      - address: '*.media.atlassian.com'
