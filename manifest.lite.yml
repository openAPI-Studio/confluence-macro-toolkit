modules:
  macro:
    - key: mermaid-diagram
      resource: mermaid-main
      icon: resource:mermaid-main;icon.svg
      title: Mermaid Diagram
      description: Render Mermaid diagrams on Confluence pages
      categories:
        - visuals
      config:
        resource: mermaid-config
        viewportSize: fullscreen
        title: Edit Mermaid Diagram
        openOnInsert: true
      resolver:
        function: resolver

    - key: markdown-renderer
      resource: markdown-main
      icon: resource:markdown-main;icon.svg
      title: Markdown
      description: Write and render Markdown content
      categories:
        - formatting
      config:
        resource: markdown-config
        viewportSize: fullscreen
        title: Edit Markdown
        openOnInsert: true
      resolver:
        function: resolver

    - key: poll-vote
      resource: poll-main
      icon: resource:poll-main;icon.svg
      title: Poll / Vote
      description: Create polls and collect votes from users
      categories:
        - communication
      config:
        resource: poll-config
        viewportSize: large
        title: Create Poll
        openOnInsert: true
      resolver:
        function: resolver

    - key: mood-macro
      resource: mood-main
      icon: resource:mood-main;icon.svg
      title: Mood
      description: Visualize team mood with floating bubbles
      categories:
        - communication
      config:
        resource: mood-config
        viewportSize: large
        title: Create Mood Board
        openOnInsert: true
      resolver:
        function: resolver

    - key: graph-chart
      resource: graph-main
      icon: resource:graph-main;icon.svg
      title: Graph / Chart
      description: Render interactive charts and graphs
      categories:
        - visuals
      config:
        resource: graph-config
        viewportSize: fullscreen
        title: Configure Chart
        openOnInsert: true
      resolver:
        function: resolver

    - key: typewriter-macro
      resource: typewriter-main
      icon: resource:typewriter-main;icon.svg
      title: Typewriter
      description: Animate text with typewriter/chat-style effects
      categories:
        - formatting
      config:
        resource: typewriter-config
        viewportSize: large
        title: Typewriter Effect
        openOnInsert: true
      resolver:
        function: resolver

    - key: sticky-note
      resource: sticky-main
      title: Sticky Note
      description: Add colorful sticky notes with handwritten style
      categories:
        - formatting
      config:
        resource: sticky-config
        viewportSize: large
        title: Sticky Note
        openOnInsert: true
      resolver:
        function: resolver

    - key: spoiler-reveal
      resource: spoiler-main
      title: Spoiler / Reveal
      description: Hide content behind a pattern with animated reveal on click
      categories:
        - formatting
      config:
        resource: spoiler-config
        viewportSize: large
        title: Spoiler Settings
        openOnInsert: true
      resolver:
        function: resolver

    - key: clock-gadget
      resource: clock-main
      icon: resource:clock-main;icon.svg
      title: Clock
      description: Display configurable clock gadgets (analog/digital)
      categories:
        - visuals
      config:
        resource: clock-config
        viewportSize: large
        title: Configure Clocks
        openOnInsert: true
      resolver:
        function: resolver

  confluence:globalSettings:
    - key: macro-settings
      resource: admin-page
      icon: resource:admin-page;app-icon.svg
      title: Macro Toolkit Lite Settings
      resolver:
        function: resolver

  function:
    - key: resolver
      handler: index.handler

resources:
  - key: mermaid-main
    path: static/mermaid-macro/build
  - key: mermaid-config
    path: static/mermaid-config/build
  - key: markdown-main
    path: static/markdown-macro/build
  - key: markdown-config
    path: static/markdown-config/build
  - key: poll-main
    path: static/poll-macro/build
  - key: poll-config
    path: static/poll-config/build
  - key: mood-main
    path: static/mood-macro/build
  - key: mood-config
    path: static/mood-config/build
  - key: graph-main
    path: static/graph-macro/build
  - key: graph-config
    path: static/graph-config/build
  - key: typewriter-main
    path: static/typewriter-macro/build
  - key: typewriter-config
    path: static/typewriter-config/build
  - key: sticky-main
    path: static/sticky-macro/build
  - key: sticky-config
    path: static/sticky-config/build
  - key: spoiler-main
    path: static/spoiler-macro/build
  - key: spoiler-config
    path: static/spoiler-config/build
  - key: clock-main
    path: static/clock-macro/build
  - key: clock-config
    path: static/clock-config/build
  - key: admin-page
    path: static/admin-page/build

app:
  id: ari:cloud:ecosystem::app/2ea5ce8b-beea-4af5-96f5-241756e57950
  runtime:
    name: nodejs22.x
permissions:
  scopes:
    - read:confluence-content.summary
    - read:confluence-user
    - write:confluence-file
    - storage:app
    - search:confluence
    - readonly:content.attachment:confluence
